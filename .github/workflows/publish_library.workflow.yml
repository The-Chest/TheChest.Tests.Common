name: Publish library  

on:
  push:
     tags:        
      - "**"

permissions:
  contents: read

env:
  PROJECT_NAME: "TheChest.Tests.Common"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
  
      - name: Get Current Version
        id: get-version
        uses: The-Chest/Actions/get-version@v1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '6.0.x'

      - name: Dotnet Build
        id: dotnet-build
        uses: The-Chest/Actions/dotnet-build@v1
        with:
          project-path: "src"
          create-build-artifact: true
          artifact-name: "${{ env.PROJECT_NAME }}.${{ steps.get-version.outputs.version }}"
          artifact-folder: "src/bin/Release/netstandard2.1"
  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
  
      - name: Get Version
        id: get-version
        uses: The-Chest/Actions/get-version@v1

      - name: Download Build Artifact
        uses: actions/download-artifact@v6
        with:
          name: "${{ env.PROJECT_NAME }}.${{ steps.get-version.outputs.version }}"
          path: "src/bin/Release/netstandard2.1"

      - name: Restore dependencies
        run: dotnet restore src
      
      - name: Push library to Github Packages
        run: dotnet nuget push ${{ env.PROJECT_NAME }}.${{ steps.get-version.outputs.version }}.nupkg --source https://nuget.pkg.github.com/The-Chest/index.json --api-key "${{secrets.GH_NUGET_APIKEY}}"

      - name: Upload DLL to release
        uses: The-Chest/Actions/upload-release-artifacts@v1
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          path: "src/bin/Release/netstandard2.1"
          name: "${{ env.PROJECT_NAME }}.dll"
          version: "${{ steps.get-version.outputs.version }}"